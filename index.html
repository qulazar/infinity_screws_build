<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity Web Player | infinity_screws</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-page">
      <div id="unity-container">
        <canvas id="unity-canvas" width=720 height=1280 tabindex="-1"></canvas>
        <div id="unity-warning"> </div>
      </div>
    </div>
    <script src="Build/398c07f5585cccfc844f4dbe00c807cc.loader.js"></script>
    <script>
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == "error") {
          div.style = "background: #c62828; color: white; padding: 10px;";
        } else {
          if (type == "warning") {
            div.style = "background: #f9a825; color: #111; padding: 10px;";
          }

          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }

        updateBannerVisibility();
      }

      var canvas = document.querySelector("#unity-canvas");
      canvas.style.background = "#CCCCCC";

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/d8ee313030c96c1c1bbfd5168d7359c3.data.unityweb",
        frameworkUrl: "Build/5e12bdc90e1ab0a464bacdddb3071456.framework.js.unityweb",
        codeUrl: "Build/c67d86c915f0a01d1aad11033cb25c47.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "kekuru",
        productName: "infinity_screws",
        productVersion: "0.1.0",
        showBanner: unityShowBanner
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
