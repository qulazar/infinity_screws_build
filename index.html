<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity Web Player | infinity_screws</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-page">
      <div id="unity-container">
        <canvas id="unity-canvas" width=720 height=1280 tabindex="-1"></canvas>
        <div id="unity-warning"> </div>
      </div>
    </div>
    <script src="Build/7fd34e3876b75c4dedd846993c3f4f2d.loader.js"></script>
    <script>
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == "error") {
          div.style = "background: #c62828; color: white; padding: 10px;";
        } else {
          if (type == "warning") {
            div.style = "background: #f9a825; color: #111; padding: 10px;";
          }

          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }

        updateBannerVisibility();
      }

      var canvas = document.querySelector("#unity-canvas");
      canvas.style.background = "#CCCCCC";

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/4d8c447b52cb56a6f72b093a94dd344d.data.unityweb",
        frameworkUrl: "Build/7d162cf18e49c962f07dd8c7732bf7a9.framework.js.unityweb",
        codeUrl: "Build/66f7ea803484161b198b9bd95effb62f.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "kekuru",
        productName: "infinity_screws",
        productVersion: "0.1.0",
        showBanner: unityShowBanner
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
